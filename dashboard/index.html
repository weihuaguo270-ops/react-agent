<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 交互 + 轨迹查看器</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--border:#e0e2e6;--text:#1a1d23;--muted:#6b7280;--accent:#3b82f6;--accent-hover:#2563eb;--green:#22c55e;--green-bg:#f0fdf4;--orange:#f59e0b;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px}
.layout{display:flex;height:100vh}
/* 左侧：聊天 */
.chat-panel{width:420px;min-width:420px;display:flex;flex-direction:column;background:var(--card);border-right:1px solid var(--border)}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
.chat-header .sub{font-weight:400;font-size:12px;color:var(--muted)}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px}
.msg{margin-bottom:12px;display:flex;flex-direction:column}
.msg.user{align-items:flex-end}
.msg.assistant{align-items:flex-start}
.msg-bubble{max-width:90%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:#f0f2f5;color:var(--text);border-bottom-left-radius:4px}
.msg.assistant .msg-bubble.thinking{background:#fff7ed;color:#92400e;font-style:italic}
.msg-meta{font-size:11px;color:var(--muted);margin-top:2px;padding:0 4px}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input-area textarea{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:8px;resize:none;font-size:13px;outline:0;font-family:inherit;min-height:44px;max-height:120px}
.chat-input-area textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.chat-input-area button{padding:10px 18px;border:none;background:var(--accent);color:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.chat-input-area button:hover{background:var(--accent-hover)}
.chat-input-area button:disabled{opacity:.5;cursor:not-allowed}
.chat-input-area .status{font-size:11px;color:var(--muted);align-self:center;white-space:nowrap}
/* 右侧：主区（顶部轨迹信息 + 下面回放） */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.main-header .query-display{font-weight:600;font-size:14px}
.main-header .meta-display{font-size:11px;color:var(--muted)}
.main-header .actions{display:flex;gap:6px}
.btn{padding:5px 12px;border:1px solid var(--border);background:var(--card);border-radius:6px;cursor:pointer;font-size:12px}
.btn:hover{background:#f0f2f5}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:#16a34a}
/* 右侧内容 */
.content{flex:1;overflow-y:auto;padding:16px 20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:10px 14px;text-align:center}
.stat-card .label{font-size:10px;color:var(--muted);margin-bottom:2px}
.stat-card .value{font-size:16px;font-weight:700}
.step-card{background:var(--card);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.step-hd{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fafbfc;border-bottom:1px solid var(--border);user-select:none}
.step-hd:hover{background:#f0f2f5}
.step-hd .sn{font-weight:600;font-size:13px}
.step-hd .sm{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center}
.step-bd{padding:14px;display:none}
.step-bd.open{display:block}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500;margin-bottom:4px}
.tag-thought{background:#eef2ff;color:#4f46e5}
.tag-tool{background:#fff7ed;color:#c2410c}
.tag-result{background:var(--green-bg);color:#16a34a}
.thought-block{background:#f8fafc;border-radius:6px;padding:10px;margin:6px 0;font-size:13px;line-height:1.6;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,monospace}
.tool-block{background:#fff7ed;border-radius:6px;padding:8px 10px;margin:6px 0;font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px}
.tool-block .tn{color:#c2410c;font-weight:600}
.result-block{background:var(--green-bg);border-radius:6px;padding:8px 10px;margin:6px 0;font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;color:#166534;max-height:180px;overflow-y:auto;white-space:pre-wrap}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:8px}
.empty-state .text{font-size:14px}
</style>
</head>
<body>
<div class="layout">
  <!-- 左侧聊天 -->
  <div class="chat-panel">
    <div class="chat-header">💬 Agent 聊天 <span class="sub">输入问题实时运行</span></div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="输入问题，按 Ctrl+Enter 发送..." onkeydown="if(e.ctrlKey&&e.key==='Enter')sendQuery()"></textarea>
      <button id="chat-send" onclick="sendQuery()">发送</button>
      <span class="status" id="chat-status"></span>
    </div>
  </div>
  <!-- 右侧轨迹 -->
  <div class="main">
    <div class="main-header">
      <div><span class="query-display" id="current-query">等待输入...</span><br><span class="meta-display" id="current-meta"></span></div>
      <div class="actions">
        <button class="btn" id="btn-prev" disabled onclick="prevStep()">←</button>
        <button class="btn btn-primary" id="btn-play" onclick="togglePlay()">▶ 播放</button>
        <button class="btn" id="btn-next" disabled onclick="nextStep()">→</button>
        <button class="btn" onclick="showClearDialog()">🗑️</button>
        <button class="btn" onclick="shutdownServer()">⏻</button>
      </div>
    </div>
    <div class="content" id="viewer">
      <div class="empty-state"><div class="icon">📂</div><div class="text">从左侧输入问题开始</div></div>
    </div>
  </div>
</div>

<div id="clear-dialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center" onclick="if(event.target===this)hideClearDialog()">
  <div style="background:#fff;border-radius:12px;padding:24px;min-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.15)">
    <h3 style="margin-bottom:12px">🗑️ 清理轨迹文件</h3>
    <div style="font-size:13px;color:#666;margin-bottom:16px">
      轨迹文件保留在 <code>trajectories/</code> 目录，删除后不可恢复。
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn" onclick="doClear(0)" style="flex:1">全部删除</button>
      <button class="btn" onclick="doClear(7)" style="flex:1">保留近7天</button>
      <button class="btn" onclick="doClear(30)" style="flex:1">保留近30天</button>
    </div>
    <div id="clear-result" style="font-size:12px;color:#666;margin-bottom:12px"></div>
    <button class="btn" onclick="hideClearDialog()" style="width:100%">取消</button>
  </div>
</div>

<script>
// ===== 状态 =====
let currentData = null;
let currentStep = 0;
let playTimer = null;
let isRunning = false;

// ===== 工具 =====
const esc = s => { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML };

// ===== 发送查询 =====
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') sendQuery();
});

async function sendQuery() {
  const input = document.getElementById('chat-input');
  const query = input.value.trim();
  if (!query || isRunning) return;

  // 清输入、禁用按钮
  input.value = '';
  document.getElementById('chat-send').disabled = true;
  document.getElementById('chat-status').textContent = '运行中...';
  isRunning = true;

  // 添加到聊天
  appendMsg('user', query);
  const assistantId = appendMsg('assistant', '思考中...', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query}),
    });
    const data = await res.json();

    if (data.error) {
      updateMsg(assistantId, `❌ 错误: ${data.error}`, false);
    } else {
      updateMsg(assistantId, data.stdout || '(无输出)', false);
      // 加载轨迹
      if (data.trajectory) {
        currentData = data.trajectory;
        currentStep = 0;
        updateHeader();
        updateButtons();
        renderTrajectory();
        loadList();       // 刷新左侧轨迹列表，新记录会显示在顶部
      }
    }
  } catch (err) {
    updateMsg(assistantId, `❌ 请求失败: ${err.message}`, false);
  }

  document.getElementById('chat-send').disabled = false;
  document.getElementById('chat-status').textContent = '';
  isRunning = false;
}

function appendMsg(role, text, thinking=false) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const cls = thinking ? 'msg-bubble thinking' : 'msg-bubble';
  div.innerHTML = `<div class="${cls}">${esc(text)}</div><div class="msg-meta">${new Date().toLocaleTimeString()}</div>`;
  div.dataset.id = Date.now() + Math.random();
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return div.dataset.id;
}

function updateMsg(id, text, thinking) {
  const el = document.querySelector(`[data-id="${id}"] .msg-bubble`);
  if (el) { el.textContent = text; el.className = thinking ? 'msg-bubble thinking' : 'msg-bubble'; }
}

// ===== 渲染轨迹 =====
function updateHeader() {
  if (!currentData) return;
  document.getElementById('current-query').textContent = currentData.query || '(空)';
  document.getElementById('current-meta').textContent =
    `🆔 ${currentData.session_id||''}  🤖 ${currentData.model||''}  ⏱ ${currentData.total_duration_seconds||0}s  💰 ~${currentData.total_tokens_estimated||0}t`;
}

function updateButtons() {
  if (!currentData) return;
  const steps = currentData.steps || [];
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep >= steps.length - 1;
}

function renderTrajectory() {
  const viewer = document.getElementById('viewer');
  const d = currentData;
  if (!d) return;
  const steps = d.steps || [];

  // 统计
  let html = `<div class="stats">
    <div class="stat-card"><div class="label">步骤</div><div class="value">${steps.length}</div></div>
    <div class="stat-card"><div class="label">耗时</div><div class="value">${(d.total_duration_seconds||0).toFixed(1)}s</div></div>
    <div class="stat-card"><div class="label">Token</div><div class="value">~${((d.total_tokens_estimated||0)/1000).toFixed(1)}k</div></div>
    <div class="stat-card"><div class="label">当前</div><div class="value">${currentStep+1}/${steps.length}</div></div>
  </div>`;

  // 步骤卡片
  steps.forEach((s, idx) => {
    const stepNum = s.step || idx + 1;
    const thought = s.thought || s.content || '';
    const action = s.action || {};
    const obs = s.observation || s.result || '';
    const isOpen = idx === currentStep ? ' open' : '';
    const dur = s.duration_seconds || '';

    html += `<div class="step-card">
      <div class="step-hd" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="sn">步骤 ${stepNum}</span>
        <span class="sm">${dur ? dur+'s' : ''} ${idx===currentStep ? '◀ 当前' : ''}</span>
      </div>
      <div class="step-bd${isOpen}">`;

    if (thought) {
      html += `<span class="tag tag-thought">💭 思考</span><div class="thought-block">${esc(thought)}</div>`;
    }
    if (action.name) {
      html += `<span class="tag tag-tool">🔧 ${esc(action.name)}</span><div class="tool-block"><span class="tn">${esc(action.name)}</span>(<span class="ta">${esc(JSON.stringify(action.arguments||{}))}</span>)</div>`;
    }
    if (obs) {
      html += `<span class="tag tag-result">📥 返回</span><div class="result-block">${esc(obs.substring(0,500))}${obs.length>500?'<br><em>...(截断)</em>':''}</div>`;
    }
    html += `</div></div>`;
  });

  // 最终答案
  if (d.final_answer) {
    html += `<div style="background:var(--green-bg);border:1px solid #86efac;border-radius:var(--radius);padding:14px;margin-top:12px">
      <div style="font-size:11px;color:#16a34a;font-weight:600;margin-bottom:4px">🎯 最终答案</div>
      <div style="font-size:14px;line-height:1.6;white-space:pre-wrap">${esc(d.final_answer)}</div>
    </div>`;
  }

  viewer.innerHTML = html;
}

// ===== 步骤导航 =====
function prevStep() {
  if (currentStep>0) { currentStep--; updateButtons(); renderTrajectory(); }
}
function nextStep() {
  if (currentData && currentStep<(currentData.steps||[]).length-1) { currentStep++; updateButtons(); renderTrajectory(); }
}
function togglePlay() {
  const btn = document.getElementById('btn-play');
  if (playTimer) {
    clearInterval(playTimer); playTimer=null;
    btn.textContent='▶ 播放'; btn.className='btn btn-primary';
    return;
  }
  btn.textContent='⏸ 暂停'; btn.className='btn btn-green';
  playTimer = setInterval(() => {
    if (!currentData || currentStep>=(currentData.steps||[]).length-1) {
      clearInterval(playTimer); playTimer=null;
      btn.textContent='▶ 播放'; btn.className='btn btn-primary';
      return;
    }
    currentStep++; updateButtons(); renderTrajectory();
  }, 1500);
}

// ===== 清理轨迹弹窗 =====
function showClearDialog() {
  document.getElementById('clear-dialog').style.display = 'flex';
  document.getElementById('clear-result').textContent = '';
}
function hideClearDialog() {
  document.getElementById('clear-dialog').style.display = 'none';
}
async function doClear(days) {
  const btn = event.target;
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '清理中...';
  try {
    const res = await fetch('/api/trajectories/clear', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({days}),
    });
    const data = await res.json();
    document.getElementById('clear-result').textContent = data.message || data.error || '清理完成';
    loadList();  // 刷新左侧列表
  } catch (err) {
    document.getElementById('clear-result').textContent = '请求失败: ' + err.message;
  }
  btn.disabled = false;
  btn.textContent = originalText;
}
async function shutdownServer() {
  if (!confirm('确认关闭 Dashboard 服务？')) return;
  try {
    await fetch('/api/shutdown', {method:'POST'});
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#666">Dashboard 已关闭，可关闭此页面</div>';
  } catch(e) {}
}
</script>
</body>
</html>
