<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 轨迹查看器</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--border:#e0e2e6;--text:#1a1d23;--muted:#6b7280;--accent:#3b82f6;--accent-hover:#2563eb;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px}
.layout{display:flex;height:100vh}
/* 左侧面板 */
.sidebar{width:340px;min-width:340px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-header h1{font-size:17px;font-weight:700}
.sidebar-header .badge{background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.sidebar-search{padding:12px 16px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:0}
.sidebar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.sidebar-item{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:4px;transition:background .1s}
.sidebar-item:hover{background:#f0f2f5}
.sidebar-item.active{background:#eff6ff;border-left:3px solid var(--accent)}
.sidebar-item .title{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.sidebar-item .meta{font-size:11px;color:var(--muted);display:flex;gap:8px}
.sidebar-item .model-tag{font-size:10px;background:var(--bg);padding:1px 6px;border-radius:4px;color:var(--muted)}
.sidebar-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
/* 右侧主区 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 24px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.main-header .info{display:flex;align-items:center;gap:12px}
.main-header .info .query{font-weight:600;font-size:15px}
.main-header .info .meta{font-size:12px;color:var(--muted)}
.main-header .actions{display:flex;gap:8px}
.btn{padding:6px 14px;border:1px solid var(--border);background:var(--card);border-radius:6px;cursor:pointer;font-size:13px;transition:all .1s;white-space:nowrap}
.btn:hover{background:#f0f2f5}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:#16a34a;border-color:#16a34a}
/* 对比模式 */
.compare-bar{display:none;padding:8px 24px;background:var(--bg);font-size:12px;color:var(--muted);align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.compare-bar.show{display:flex}
/* 步骤内容 */
.content{flex:1;overflow-y:auto;padding:20px 24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:18px;font-weight:700}
.step-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.step-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:#fafbfc;border-bottom:1px solid var(--border)}
.step-header:hover{background:#f0f2f5}
.step-header .step-num{font-weight:600;font-size:14px}
.step-header .step-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}
.step-header .toggle{font-size:12px;color:var(--muted);transition:transform .2s}
.step-header .toggle.open{transform:rotate(180deg)}
.step-body{padding:16px;display:none}
.step-body.open{display:block}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.tag-thought{background:#eef2ff;color:#4f46e5}
.tag-tool{background:#fff7ed;color:#c2410c}
.tag-result{background:#f0fdf4;color:#16a34a}
.thought-block{background:#f8fafc;border-radius:6px;padding:12px;margin:8px 0;font-size:13px;line-height:1.6;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,monospace}
.tool-block{background:#fff7ed;border-radius:6px;padding:10px 12px;margin:8px 0;font-family:ui-monospace,SFMono-Regular,monospace;font-size:13px}
.tool-block .tool-name{color:#c2410c;font-weight:600}
.tool-block .tool-args{color:#92400e}
.result-block{background:#f0fdf4;border-radius:6px;padding:10px 12px;margin:8px 0;font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;color:#166534;max-height:200px;overflow-y:auto;white-space:pre-wrap}
.final-card{background:#f0fdf4;border:1px solid #86efac;border-radius:var(--radius);padding:20px;margin-top:20px}
.final-card .label{font-size:12px;color:#16a34a;font-weight:600;margin-bottom:8px}
.final-card .answer{font-size:15px;line-height:1.6;white-space:pre-wrap}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state .text{font-size:15px;margin-bottom:4px}
.empty-state .sub{font-size:12px;color:var(--muted)}
/* 进度条 */
.progress-bar{height:3px;background:#e5e7eb;border-radius:2px;margin:8px 0}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.code-inline{font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;color:var(--text);word-break:break-all}
</style>
</head>
<body>
<div class="layout">
  <!-- 左侧 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>🛤️ 轨迹</h1>
      <span class="badge" id="total-badge">0</span>
    </div>
    <div class="sidebar-search">
      <input id="search-input" type="text" placeholder="搜索轨迹...">
    </div>
    <div class="sidebar-list" id="file-list"></div>
  </div>
  <!-- 右侧 -->
  <div class="main">
    <div class="main-header">
      <div class="info">
        <span class="query" id="current-query">选择一条轨迹</span>
        <span class="meta" id="current-meta"></span>
      </div>
      <div class="actions">
        <button class="btn" id="btn-compare" onclick="toggleCompare()" title="对比模式">📊 对比</button>
        <button class="btn" id="btn-prev" disabled onclick="prevStep()">←</button>
        <button class="btn btn-primary" id="btn-play" onclick="togglePlay()">▶ 播放</button>
        <button class="btn" id="btn-next" disabled onclick="nextStep()">→</button>
      </div>
    </div>
    <div class="compare-bar" id="compare-bar">
      <span>🔄 对比模式：</span>
      <span id="compare-list"></span>
      <button class="btn" onclick="clearCompare()" style="font-size:11px;padding:2px 8px">清除</button>
    </div>
    <div class="content" id="viewer">
      <div class="empty-state">
        <div class="icon">📂</div>
        <div class="text">从左侧选择一条轨迹</div>
        <div class="sub">轨迹由运行 react_loop.py 自动生成</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 状态 =====
let allRecords = [];
let currentData = null;
let currentStep = 0;
let playTimer = null;
let compareSessions = [];

// ===== 工具 =====
const esc = s => { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML };
const ts = s => { if(!s)return''; try{return new Date(s).toLocaleString()}catch(e){return s} };

// ===== 加载列表 =====
async function loadList() {
  const res = await fetch('/api/trajectories');
  allRecords = await res.json();
  document.getElementById('total-badge').textContent = allRecords.length;
  renderList(allRecords);
}

function renderList(records) {
  const container = document.getElementById('file-list');
  container.innerHTML = '';
  if (records.length === 0) {
    container.innerHTML = '<div class="sidebar-empty">暂无轨迹文件</div>';
    return;
  }
  records.forEach(r => {
    const d = document.createElement('div');
    d.className = 'sidebar-item';
    d.dataset.name = r.name;
    if (r.active) d.classList.add('active');
    const timeStr = r.timestamp ? ts(r.timestamp) : '';

    let stepsStr = r.steps !== undefined ? `${r.steps} 步` : '';
    let durStr = r.duration ? `${r.duration}s` : '';

    d.innerHTML = `<div class="title">${esc(r.query || '(空)')}</div>
      <div class="meta">
        <span>${timeStr}</span>
        <span class="model-tag">${esc(r.model || '')}</span>
        <span>${stepsStr}</span>
        <span>${durStr}</span>
      </div>`;
    d.onclick = () => selectRecord(r.name);
    container.appendChild(d);
  });
}

// ===== 搜索过滤 =====
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  let filtered = allRecords;
  if (q) filtered = allRecords.filter(r => r.query && r.query.toLowerCase().includes(q));
  renderList(filtered.map(r=>({...r, active: currentData && r.name===currentData._name})));
});

// ===== 选中轨迹 =====
async function selectRecord(name) {
  const res = await fetch('/api/trajectories/' + name);
  currentData = await res.json();
  currentData._name = name;
  currentStep = 0;
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });
  // 更新搜索列表高亮
  renderList(allRecords.map(r=>({...r, active: r.name===name})));

  updateHeader();
  updateButtons();
  renderContent();
  document.getElementById('search-input').value = '';
}

function updateHeader() {
  const d = currentData;
  if (!d) return;
  document.getElementById('current-query').textContent = d.query || '(空)';
  const meta = `🆔 ${d.session_id||''}  🤖 ${d.model||''}  ⏱ ${d.total_duration_seconds||0}s  💰 ~${d.total_tokens_estimated||0}t`;
  document.getElementById('current-meta').textContent = meta;
}

function updateButtons() {
  if (!currentData) return;
  const steps = currentData.steps || [];
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep >= steps.length - 1;
}

// ===== 渲染主区 =====
function renderContent() {
  const viewer = document.getElementById('viewer');
  const d = currentData;
  if (!d) return;
  const steps = d.steps || [];

  if (steps.length === 0) {
    viewer.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="text">该轨迹无步骤记录</div></div>`;
    return;
  }

  let html = '';

  // 统计面板
  const totalDur = d.total_duration_seconds || 0;
  const totalTok = d.total_tokens_estimated || 0;
  html += `<div class="stats">
    <div class="stat-card"><div class="label">步骤</div><div class="value">${steps.length}</div></div>
    <div class="stat-card"><div class="label">耗时</div><div class="value">${totalDur.toFixed(1)}s</div></div>
    <div class="stat-card"><div class="label">Token</div><div class="value">~${(totalTok/1000).toFixed(1)}k</div></div>
    <div class="stat-card"><div class="label">当前步</div><div class="value">${currentStep + 1} / ${steps.length}</div></div>
  </div>`;

  // 进度条
  const pct = ((currentStep + 1) / steps.length * 100).toFixed(0);
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  // 当前步
  const s = steps[currentStep];
  const stepNum = s.step || currentStep + 1;
  html += `<div class="step-card">`;
  html += `<div class="step-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.toggle').classList.toggle('open')">
    <span class="step-num">步骤 ${stepNum}</span>
    <span class="step-meta">
      <span>${s.duration_seconds ? s.duration_seconds+'s' : ''}</span>
      <span class="toggle open">▼</span>
    </span>
  </div>`;
  html += `<div class="step-body open">`;

  // Thought
  const thought = s.thought || s.content || '';
  if (thought) {
    html += `<div><span class="tag tag-thought">💭 思考</span></div>`;
    html += `<div class="thought-block">${esc(thought)}</div>`;
  }

  // Action
  const action = s.action || {};
  if (action.name) {
    html += `<div style="margin-top:8px"><span class="tag tag-tool">🔧 工具调用</span></div>`;
    html += `<div class="tool-block"><span class="tool-name">${esc(action.name)}</span>(<span class="tool-args">${esc(JSON.stringify(action.arguments || {}))}</span>)</div>`;
  }

  // Observation
  const obs = s.observation || s.result || '';
  if (obs) {
    html += `<div style="margin-top:8px"><span class="tag tag-result">📥 返回</span></div>`;
    html += `<div class="result-block">${esc(obs.substring(0, 500))}${obs.length>500?'<br><em>...(截断)</em>':''}</div>`;
  }

  html += `</div></div>`;

  // 最终答案
  if (d.final_answer && currentStep === steps.length - 1) {
    html += `<div class="final-card">
      <div class="label">🎯 最终答案</div>
      <div class="answer">${esc(d.final_answer)}</div>
    </div>`;
  }

  viewer.innerHTML = html;
}

// ===== 导航 =====
function prevStep() { if (currentStep>0) { currentStep--; updateButtons(); renderContent(); } }
function nextStep() { if (currentData && currentStep<(currentData.steps||[]).length-1) { currentStep++; updateButtons(); renderContent(); } }
function togglePlay() {
  const btn = document.getElementById('btn-play');
  if (playTimer) { clearInterval(playTimer); playTimer=null; btn.textContent='▶ 播放'; btn.className='btn btn-primary'; return; }
  btn.textContent='⏸ 暂停'; btn.className='btn btn-green';
  playTimer = setInterval(() => {
    if (!currentData || currentStep>=(currentData.steps||[]).length-1) {
      clearInterval(playTimer); playTimer=null; btn.textContent='▶ 播放'; btn.className='btn btn-primary'; return;
    }
    currentStep++; updateButtons(); renderContent();
  }, 1500);
}

// ===== 对比模式 =====
function toggleCompare() {
  const bar = document.getElementById('compare-bar');
  bar.classList.toggle('show');
}
function clearCompare() {
  compareSessions = [];
  document.getElementById('compare-list').textContent = '';
  document.getElementById('compare-bar').classList.remove('show');
}
function addCompare(name) {
  if (compareSessions.includes(name)) { compareSessions = compareSessions.filter(x=>x!==name); }
  else { compareSessions.push(name); }
  document.getElementById('compare-list').textContent = compareSessions.join(', ');
}
function compareSelected() {
  if (compareSessions.length < 2) return;
  // 在新标签页打开对比（后续可实现为内嵌对比视图）
  // 目前用简单方式：逐个显示
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && !document.getElementById('btn-prev').disabled) prevStep();
  if (e.key === 'ArrowRight' && !document.getElementById('btn-next').disabled) nextStep();
  if (e.key === ' ' && e.target.tagName !== 'INPUT') { e.preventDefault(); togglePlay(); }
});

// ===== 初始化 =====
loadList();
</script>
</body>
</html>
