name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: "Real LLM suite to run when API secret is configured"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full

jobs:
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install lint tools
      run: pip install flake8
    - name: Lint
      run: flake8 src/ tests/ --max-line-length=100 --count

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install -e .
        pip install pytest
    - name: Script tests
      run: python test_all.py
    - name: Pytest (offline)
      run: pytest tests/ -q --ignore=tests/test_real_llm.py

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install react-agent
      run: pip install -e .
    - name: Clone & install llm-eval-engine
      run: |
        git clone --depth=1 https://github.com/weihuaguo270-ops/llm-eval-engine.git /tmp/llm-eval-engine
        pip install -e /tmp/llm-eval-engine
    - name: Clone & install trace-debugger
      run: |
        git clone --depth=1 https://github.com/weihuaguo270-ops/trace-debugger.git /tmp/trace-debugger
        pip install -e /tmp/trace-debugger
    - name: Run Agent → Eval integration
      run: python examples/agent_to_eval.py
    - name: Run Harness closed-loop demo (schema → tdebug → eval)
      run: python examples/harness_closed_loop.py --fixture
    - name: Verify eval-engine scoring path
      run: python tests/ci_verify_integration.py

  # Probe secret without exposing it in job-level `if` (secrets context is invalid there).
  real-llm-gate:
    name: Real LLM gate
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.probe.outputs.has_key }}
    steps:
    - id: probe
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        if [ -n "$DEEPSEEK_API_KEY" ]; then
          echo "has_key=true" >> "$GITHUB_OUTPUT"
          echo "DEEPSEEK_API_KEY is configured — real LLM jobs may run"
        else
          echo "has_key=false" >> "$GITHUB_OUTPUT"
          echo "No DEEPSEEK_API_KEY secret — real LLM jobs will be skipped"
        fi

  # Smoke is required evidence when the key exists: failures fail this job.
  real-llm-smoke:
    name: Real LLM (smoke)
    needs: real-llm-gate
    if: >-
      ${{ needs.real-llm-gate.outputs.has_key == 'true' &&
          (github.event_name != 'workflow_dispatch' ||
           github.event.inputs.suite == 'smoke') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install
      run: |
        pip install -e .
        pip install pytest
    - name: Smoke tests (live DeepSeek)
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        LLM_PROVIDER: deepseek
        REACT_AGENT_SANDBOX_PREWARM: "0"
        REACT_AGENT_SKIP_RAG: "1"
      run: |
        pytest tests/test_real_llm.py -v -m real_llm_smoke --tb=short \
          --junitxml=real-llm-smoke-junit.xml
    - name: Upload smoke junit
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: real-llm-smoke-junit
        path: real-llm-smoke-junit.xml
        if-no-files-found: ignore

  # Full live suite: manual dispatch only (cost/time).
  real-llm-full:
    name: Real LLM (full)
    needs: real-llm-gate
    if: >-
      ${{ needs.real-llm-gate.outputs.has_key == 'true' &&
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.suite == 'full' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install
      run: |
        pip install -e .
        pip install pytest
    - name: Full real LLM suite
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        LLM_PROVIDER: deepseek
        REACT_AGENT_SANDBOX_PREWARM: "0"
        REACT_AGENT_SKIP_RAG: "1"
      run: |
        pytest tests/test_real_llm.py -v -m real_llm --tb=short \
          --junitxml=real-llm-full-junit.xml
    - name: Upload full junit
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: real-llm-full-junit
        path: real-llm-full-junit.xml
        if-no-files-found: ignore
