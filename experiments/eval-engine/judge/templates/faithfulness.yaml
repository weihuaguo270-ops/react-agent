# 评分模板：Faithfulness（答案忠实度）
# 用于评估 Agent 的回答是否基于实际检索/工具返回的数据

name: faithfulness
description: 评估 Agent 回答是否忠实于提供的 context，而非模型记忆
min_score: 4
max_score: 5
weight: 2.0
rubric: |
  检查最终答案是否基于提供的 context，而不是模型自身的训练记忆。

  评分标准：
  5 分 = 完全基于 context，每个信息点都能在检索结果中找到出处
  4 分 = 大部分基于 context，有少量合理推断但未偏离 context
  3 分 = 混用了 context 和模型记忆，部分内容缺乏出处
  2 分 = 大部分信息来自模型记忆，context 利用率低
  1 分 = 完全编造，与提供的 context 无关或矛盾

  注意事项：
  - "合理推断"（如基于数据得出的结论）不算编造
  - 如果 context 中没有相关信息，Agent 应该承认不知道而非编造
  - 关注 Agent 是否引用了具体的来源或数据
