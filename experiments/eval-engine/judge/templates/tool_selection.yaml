# 评分模板：Tool Selection（工具选择合理性）
# 用于评估 Agent 在每一步中选择的工具是否合理

name: tool_selection
description: 评估 Agent 是否在正确时机选择了正确的工具
min_score: 4
max_score: 5
weight: 1.5
rubric: |
  评估 Agent 在当前步骤中选择的工具是否合理。

  评分标准：
  5 分 = 最优选择——这个工具完美匹配当前需求
  4 分 = 合理选择——工具能解决问题，但可能有更好的替代方案
  3 分 = 可用但非最优——工具能用但效率不高，或不是最直接的方案
  2 分 = 不恰当的选择——工具与目标部分相关，但明显不是最佳
  1 分 = 完全错误的工具——完全不应该在这里使用

  注意事项：
  - 考虑 Agent 当前可用的信息量（不要用"早知道"去评判）
  - 如果 Agent 在搜索后立即调用另一个工具，这是正常的
  - 同一步调多个工具是合理的（独立子任务可并行）
  - 如果 Agent 重复调用同一个工具且参数相似，考虑扣分
